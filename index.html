<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Electric Sheep Cathedral</title>
    <meta
      name="description"
      content="A contemplative swarm cathedral shaped by gaze and breath cadence."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="scene-shell">
      <canvas id="cathedralCanvas" aria-label="Electric Sheep Cathedral scene"></canvas>

      <section class="hud" aria-label="Experience controls">
        <div class="hud-top">
          <h1>Electric Sheep Cathedral</h1>
          <p id="phaseLabel">Arrival</p>
        </div>

        <div class="hud-controls">
          <button id="micToggle" type="button">Enable Breath Mic</button>
          <button id="contrastToggle" type="button">High Contrast: Off</button>
          <button id="motionToggle" type="button">Reduce Motion: Off</button>
          <button id="captureButton" type="button">Capture Poster</button>
          <button id="shareButton" type="button">Copy Seed Link</button>
        </div>

        <div class="hud-bottom">
          <p>
            Interact with pointer drift and breath. Hold mouse or touch for pseudo-breath if mic is off.
          </p>
          <p id="seedLabel"></p>
        </div>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
